name: PR Accepted Deployment
run-name: PR from ${{ github.actor }} accepted - triggered a ${{ github.event_name }}
 
on:
  workflow_dispatch:
    # inputs:
    #   environment:
    #     description: 'Target Environment''required: truedefault: ''staging''type: choice
    #     options:
    #     - staging
    #     - production

permissions:
  id-token: write   
  contents: read
 
jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
 
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.PRD_ACCOUNT }}
      # SNOWFLAKE_USER: ${{ secrets.USER_NAME }}
      # SNOWFLAKE_PASSWORD: ${{ secrets.PASSWORD }}
      SNOWFLAKE_CONNECTIONS_DEFAULT_DATABASE: ${{vars.SF_DB_NAME_PRD}}
      SNOWFLAKE_CONNECTIONS_DEFAULT_SCHEMA: ${{vars.SF_SCH_NAME_PRD}}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0
        with: # Ensures Snowflake CLI will search for OIDC users matching this subject
          use-oidc: true
 
      - name: Check Snowflake CLI Version
        run: snow --version
 
      - name: Test Snowflake Connection
        run: snow connection test -x
 
      - name: Deploy dbt project object to PROD
        run: |
              snow dbt deploy DB_DBT_DESTI.DBT_CI_CD_PRD.dbt_prd \
                 --source ./dbt_27_Apr \
                --default-target prod \
                --dbt-version 1.10.15 \
                   --force \
                     -x
 
      - name: Run dbt project in PROD
        run: |
           snow dbt execute -x DB_DBT_DESTI.DBT_CI_CD_PRD.dbt_prd build --target prod -x
      #   run: snow sql -f ${{ github.workspace }}/tasty_bytes/schedules.sql 
